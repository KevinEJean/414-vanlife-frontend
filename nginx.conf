server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache les assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router – sert index.html pour toutes les routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy pour les endpoints du API
    location /api/ {
        proxy_pass http://localhost:3000; # À adapter selon l'environnement (localhost pour ECS, nom du service pour K8s et Docker Compose)
        proxy_http_version 1.1; 
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Origin "http://localhost:5173";
        proxy_cache_bypass $http_upgrade;
    }
}

